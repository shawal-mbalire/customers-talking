# Auto-generated by Firebase CLI, enhanced to use Bun and inject runtime env.
name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: client
        run: bun install --frozen-lockfile

      - name: Write runtime env
        working-directory: client/public
        run: |
          cat > env.js << ENVEOF
          window.__env = {
            apiUrl: '${{ secrets.CLOUD_RUN_URL }}',
            neonAuthUrl: '${{ secrets.NEON_AUTH_BASE_URL }}',
          };
          ENVEOF

      - name: Build
        working-directory: client
        run: bun run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CUSTOMERSTALKING }}
          projectId: customerstalking
