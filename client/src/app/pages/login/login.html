<div class="flex min-h-screen items-center justify-center bg-background px-4">
  <div hlmCard class="w-full max-w-sm">
    <div hlmCardHeader>
      <h1 hlmCardTitle class="text-xl">Sign in</h1>
      <p hlmCardDescription>Access your customer support dashboard</p>
    </div>
    <div hlmCardContent>
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
        <div class="flex flex-col gap-1.5">
          <label hlmLabel for="email">Email</label>
          <input hlmInput id="email" type="email" formControlName="email" autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label hlmLabel for="password">Password</label>
          <input hlmInput id="password" type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
        @if (error()) {
          <p class="text-sm text-destructive">{{ error() }}</p>
        }
        <button hlmBtn type="submit" class="w-full" [disabled]="loading()">
          {{ loading() ? 'Signing in…' : 'Sign in' }}
        </button>
      </form>
    </div>
  </div>
</div>
